services:
  - type: web
    name: budgetwise-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DB_NAME
        value: budgetwise
      - key: PYTHON_VERSION
        value: "3.11"
